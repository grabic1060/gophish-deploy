server {
    listen 80;
    server_name main.urssu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name gophish.urssu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name main.urssu.com;

    ssl_certificate /etc/letsencrypt/live/main.urssu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/main.urssu.com/privkey.pem;

    location / {
        proxy_pass http://gophish:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name gophish.urssu.com;

    ssl_certificate /etc/letsencrypt/live/gophish.urssu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gophish.urssu.com/privkey.pem;

    location / {
        proxy_pass http://gophish:3333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
