name: Docker - Build and Deploy (Gophish)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'are you ready to deploy?'
        required: true
        default: 'yes'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # 2. Docker 이미지 빌드 및 푸시
      - name: Build and push image
        env:
          ECR_REGISTRY: public.ecr.aws/${{ vars.ECR_PUBLIC_REGISTRY_ID }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --provenance=false \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t $ECR_REGISTRY/yourssu/$PROJECT_NAME:$IMAGE_TAG \
            -t $ECR_REGISTRY/yourssu/$PROJECT_NAME:latest \
            .

      # 3. 서버 배포
      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_STG_HOST }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          REGISTRY_ID: ${{ vars.ECR_PUBLIC_REGISTRY_ID }}
          IMAGE_TAG: ${{ github.sha }} # 빌드에서 사용한 태그를 그대로 사용
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem

          # [핵심] EC2 서버에서 ECR Public 로그인 수행 (토큰 만료 해결)
          aws ecr-public get-login-password --region us-east-1 | ssh -i key.pem ubuntu@$HOST "docker login --username AWS --password-stdin public.ecr.aws/$REGISTRY_ID"

          # 서버에 디렉토리 생성
          ssh -i key.pem ubuntu@$HOST "mkdir -p /home/ubuntu/${PROJECT_NAME}"

          # .env 파일 생성 (Runner에서 생성 후 전송)
          echo "SERVER_PORT=$SERVER_PORT" > .env
          echo "PROJECT_NAME=$PROJECT_NAME" >> .env
          echo "ECR_REGISTRY=public.ecr.aws/$REGISTRY_ID" >> .env
          echo "IMAGE_TAG=$IMAGE_TAG" >> .env # 조회 과정 없이 바로 주입
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

          # 파일 전송
          scp -i key.pem .env docker-compose.yml config.json ubuntu@$HOST:/home/ubuntu/${PROJECT_NAME}/

          # 배포 명령 실행
          ssh -i key.pem ubuntu@$HOST "cd /home/ubuntu/${PROJECT_NAME} && \
            docker compose pull && \
            docker compose up -d"

          # 보안을 위해 사용한 키 삭제
          rm -f key.pem