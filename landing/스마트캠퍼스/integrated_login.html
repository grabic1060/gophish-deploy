		winHeight = $(window).height();

		);
		$("#menuNav").animate({"left":0},200).height(winHeight);
		$("#sWrap").append(
			'<div class="menu_bg"></div>'
		)
		$(".menu_bg").css({
			position:"absolute",

	})
	

})

/* common */
.fl {float:left;}
.fr {float:right;}
.clear {clear:both;width:0;height:0;font-size:0;line-height:0;}
.show {display:block;}
.hide {display:none;}

/*common 선택적사용*/

.font_n { font-family: NanumGothic;} 

/* ir */
.ir_pm {display:block;overflow:hidden;width:0;height:0;font-size:0px;line-height:0;text-indent:-9999px;}
.ir_wa {display:block;overflow:hidden;position:relative;width:100%;height:100%;z-index:-1;}
.screen_out {overflow:hidden;position:absolute;left:-9999px;width:0;height:0;font-size:0;line-height:0;}
.screen_hide {font-size:0;line-height:0;visibility:hidden;}

/* Background Image - common 요소 */
.btn_comm {background:url('../Symtra_Images/btn_comm.gif') no-repeat 0 0;text-indent:-9999px;} /* 버튼 */
.btn_comm2 {background:url('../Symtra_Images/btn_comm.gif') no-repeat 0 0;text-indent:-9999px;} /* 버튼 */
.tit_comm {background:url() no-repeat;} /* 타이틀 */
.txt_comm {background:url('../Symtra_Images/txt_comm.gif') no-repeat 0 0;text-indent:-9999px;}
.ico_comm {background:url('../Symtra_Images/ico_comm.gif') no-repeat 0 0;text-indent:-9999px;}

/* Common Color */
.fc_blue {color:#000;}
.fc_orange {color:#000;}
.fc_red {color:#000;}
.fc_green {color:#000;}

/* Font Weight */
.fwb {font-weight:bold;}
.fwn {font-weight:normal;}

/* Text Align */
.al_l {text-align:left;}
.al_c {text-align:center;}
.al_r {text-align:right;}

/* Text Decoration */
.deco_line {text-decoration:underline;}
.deco_none {text-decoration:none;}

/* Letter Spacing */
.ls_0 {letter-spacing:0px;}
.ls_1 {letter-spacing:-1px;}

.placeholder { color: #000; }


/* layout */
#sWrap {overflow:hidden;margin:0 auto;}
.m_wrap {display:none;}


/* s 비주얼영역 */
.m_img {display:none;}
/*.type_s .m_img {margin-top:0;display:block;width:640px;}
.type_s .m_img img {display:block;width:640px;}*/
 .type_s .m_img {width:640px;margin:20px auto 0px 4%;}
 .type_s .m_img img {position:relative;display:block;width:164px;height:35;margin:0 ;}

	<script type="text/javascript">function imgChg(id) {
		var tab = document.getElementById(id);
		var tabanchor = tab.getElementsByTagName('a');

		for (i=0; i<tabanchor.length; i++) {
			if (tabanchor[i].childNodes[0].src.indexOf("_on.gif") != -1) {
				return false;
			} else {
				tabanchor[i].onmouseover = tabanchor[i].onfocus = function () {
					if (this.childNodes[0].src.indexOf("_on.gif") != -1) return false;
						this.childNodes[0].src = this.childNodes[0].src.replace('_off.gif', '_on.gif');
						this.parentNode.className += " on";
				}
				tabanchor[i].onmouseout = tabanchor[i].onblur = function () {
					this.childNodes[0].src = this.childNodes[0].src.replace('_on.gif', '_off.gif');
					this.parentNode.className = this.parentNode.className.replace(" on", "");
				}
			}
		}
	}

			  if (init==true) with (navigator) {if ((appName=="Netscape")&&(parseInt(appVersion)==4)) {
				document.MM_pgW=innerWidth; document.MM_pgH=innerHeight; onresize=MM_reloadPage; }}
			  else if (innerWidth!=document.MM_pgW || innerHeight!=document.MM_pgH) location.reload();
			}
			MM_reloadPage(true);

			function MM_swapImgRestore() { //v3.0
			  var i,x,a=document.MM_sr; for(i=0;a&&i<a.length&&(x=a[i])&&x.oSrc;i++) x.src=x.oSrc;
			}

			function MM_findObj(n, d) { //v4.01
			  var p,i,x;  if(!d) d=document; if((p=n.indexOf("?"))>0&&parent.frames.length) {
				d=parent.frames[n.substring(p+1)].document; n=n.substring(0,p);}
			  if(!(x=d[n])&&d.all) x=d.all[n]; for (i=0;!x&&i<d.forms.length;i++) x=d.forms[i][n];
			  for(i=0;!x&&d.layers&&i<d.layers.length;i++) x=MM_findObj(n,d.layers[i].document);
			  if(!x && d.getElementById) x=d.getElementById(n); return x;
			}
			//이미지 롤오버 스크립트
			function MM_swapImage() { //v3.0
			  var i,j=0,x,a=MM_swapImage.arguments; 
			  document.MM_sr=new Array; 
			  for(i=0;i<(a.length-2);i+=3)
			   if ((x=MM_findObj(a[i]))!=null){document.MM_sr[j++]=x; if(!x.oSrc) x.oSrc=x.src; x.src=a[i+2];}
			}

			function MM_showHideLayers() { //v6.0
			  var i,p,v,obj,args=MM_showHideLayers.arguments;
			  for (i=0; i<(args.length-2); i+=3) if ((obj=MM_findObj(args[i]))!=null) { v=args[i+2];
				if (obj.style) { obj=obj.style; v=(v=='show')?'visible':(v=='hide')?'hidden':v; }
				obj.visibility=v; }
			}

			function MM_preloadImages() { //v3.0
			  var d=document; if(d.images){ if(!d.MM_p) d.MM_p=new Array();
				var i,j=d.MM_p.length,a=MM_preloadImages.arguments; for(i=0; i<a.length; i++)
				if (a[i].indexOf("#")!=0){ d.MM_p[j]=new Image; d.MM_p[j++].src=a[i];}}
			}

		function Popup_ASP(linkurl, fwidth, fheight, mode, value, code, idx){
				
			var d = new Date();
			var s = d.getHours() + d.getMinutes() + d.getSeconds();
			
			
			var height = screen.height; 
			var width = screen.width; 
			var leftpos = width / 2- fwidth / 2; 
			var toppos = height / 2- fheight / 2;
					
			var openwinasp = window.open(linkurl + "?mode=" + mode + "&value=" + value + "&code=" + code + "&idx=" + idx, "popup_"+linkurl.replace('.asp',''), 
						  "left=" + leftpos + ", top = " + toppos + ", height=" + fheight + ", width=" + fwidth + 
						  ", menubar=no, resizable=no, status=no, scrollbars=yes");
			openwinasp.focus();
			
			d = null;
			s = null;
			fheight = null;
			fwidth = null;
			height = null;
			width = null;
			leftpos = null;
			toppos = null;	
		}

		//	varStr	: document.form.Inputbox.value

		function Trim(varStr)
		{
			var reg = /\s+/g;
			return varStr.replace(reg,'');
		}

		//사용자 입력폼 입력여부 체크
		//	varObject	: document.form.inputbox
		//	varName		: 입력폼 이름
		//**********************************************************************************//
		function fncCheckUserInputbox(varObject, varName)
		{
			if (Trim(varObject.value) == ""){
				alert(varName + " 입력하세요");
				varObject.value = "";
				varObject.focus();
				return false;
			}else{
				return true;
			}
		}

		function fncCheckUserRadioButton(varObject, varName){
			
			var chkRadio = 0;

			for(var i=0; i < varObject.length ; i++)
			{
				if(varObject[i].checked == true) 
				{
					chkRadio++
					return true;
				}
			}

			if(chkRadio == 0){
				alert(varName + " 선택해 주세요");
				varObject[0].focus();
			return;
			}
		}

	function commify(n){
		var reg = /(^[+-]?\d+)(\d{3})/;
		n += '';
		while (reg.test(n))
			n = n.replace(reg, '$1' + ',' + '$2');

		return n;

	String.prototype.number_format = function(decimals,dec_point,thousands_sep){
	if(decimals==null){decimals=999;}	
	if(dec_point==null){dec_point='.';}if(thousands_sep==null){thousands_sep=',';}
	var temp = this.toString().replace(/[^-\.\+\d]/g,'');
	var arr = temp.split(dec_point);
	
	if(arr[1] && arr[1].length>0){arr[1] = arr[1].substr(0,decimals);}
	arr[0] = arr[0].replace(/(\d)(?=(?:\d{3})+(?!\d))/g,'$1'+thousands_sep);
	temp = temp.replace(/(\d)(?=(?:\d{3})+(?!\d))/g,'$1'+thousands_sep)
	if(arr[1] && decimals>0 && arr[1].length>0){return arr[0] + dec_point + arr[1];}
	else {return temp;}
	}

	function toComma(str,element) {
		
		
		str = str + "";
		str = str.replace(/(\,)/g,"");
		var tmp1, tmp2, tmp3;
		var statValue="", strValue="", modValue="";
		if(str.substring(0,1) == "-"){
			statValue = str.substring(1,str.length);
		} else {
			statValue = str;
		}
		tmp1 = statValue.length;

		if(tmp1 > 3){
			tmp2 = Math.floor(tmp1/3);
			tmp3 = tmp1 % 3;

			if(tmp3>0){
				strValue += statValue.substring(0,tmp3) + ",";
				modValue = statValue.substring(tmp3);
			} else {
				modValue = statValue;
			}

			for ( var i=0; i < tmp2 ; i++ ){
				if(i==(tmp2-1)){
					strValue += modValue.substring(i*3,i*3+3);
				} else {
					strValue += modValue.substring(i*3,i*3+3) + ",";
				}
			}
		} else {
			strValue = statValue;
		}
		
		if(str.substring(0,1) == "-"){ srtValue = "-"+strValue; }
		else{srtValue = strValue;}
		
		//element.value=srtValue;
		element.value=element.value.number_format(2,'.',',');
	}
