l');if (display) display.textContent = emailInput.value;const passInput = document.getElementById('password-input');if (passInput) setTimeout(() => passInput.focus(), 100);}});}if (foundBackBtn) {foundBackBtn.addEventListener('click', function(e) {e.preventDefault();emailStepElements.forEach(el => el.classList.remove('tw-hidden'));passwordStepElements.forEach(el => el.classList.add('tw-hidden'));});}const toggleBtn = document.querySelector('[bitpasswordinputtoggle]');if (toggleBtn) {toggleBtn.addEventListener('click', function() {const passInput = document.getElementById('password-input');const icon = this.querySelector('i');if (passInput.type === 'password') {passInput.type = 'text';icon.classList.remove('bwi-eye');icon.classList.add('bwi-eye-slash');} else {passInput.type = 'password';icon.classList.remove('bwi-eye-slash');icon.classList.add('bwi-eye');}});}});</script></body></html>
